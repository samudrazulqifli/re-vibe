substitutions:
  _AR_HOSTNAME: asia-southeast2-docker.pkg.dev
  _AR_PROJECT_ID: re-vibe-496006
  _AR_REPOSITORY: cloud-run-source-deploy
  _DEPLOY_REGION: asia-southeast2
  _SERVICE_NAME: re-vibe

steps:
  # Step 1: baca NEXT_PUBLIC_FIREBASE_* dari Cloud Run, lalu docker build
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    id: Build
    args:
      - -c
      - |
        IMAGE=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/re-vibe/$_SERVICE_NAME:$COMMIT_SHA
        FIREBASE_ARGS=$(gcloud run services describe $_SERVICE_NAME \
          --region=$_DEPLOY_REGION \
          --project=$_AR_PROJECT_ID \
          --format=json | \
        python3 -c "
        import json, sys
        d = json.load(sys.stdin)
        envs = d['spec']['template']['spec']['containers'][0].get('env', [])
        for e in envs:
            name = e.get('name', '')
            if name.startswith('NEXT_PUBLIC_FIREBASE'):
                val = e.get('value', '')
                print(f'--build-arg {name}={val}', end=' ')
        ")
        docker build --no-cache $FIREBASE_ARGS -t $IMAGE -f Dockerfile .

  # Step 2: push ke Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: Push
    args:
      - push
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/re-vibe/$_SERVICE_NAME:$COMMIT_SHA'

  # Step 3: deploy ke Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - $_SERVICE_NAME
      - --platform=managed
      - --image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/re-vibe/$_SERVICE_NAME:$COMMIT_SHA
      - --region=$_DEPLOY_REGION
      - --quiet

images:
  - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/re-vibe/$_SERVICE_NAME:$COMMIT_SHA'
