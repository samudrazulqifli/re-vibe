steps:
  # Build — baca NEXT_PUBLIC_FIREBASE_* langsung dari Cloud Run env vars (tidak hardcode)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        FIREBASE_ARGS=$(gcloud run services describe re-vibe \
          --region=asia-southeast2 \
          --project=$PROJECT_ID \
          --format=json | \
        python3 -c "
        import json, sys
        d = json.load(sys.stdin)
        envs = d['spec']['template']['spec']['containers'][0].get('env', [])
        for e in envs:
            name = e.get('name', '')
            if name.startswith('NEXT_PUBLIC_FIREBASE'):
                val = e.get('value', '')
                print(f'--build-arg {name}={val}', end=' ')
        ")
        docker build $$FIREBASE_ARGS \
          -t gcr.io/$PROJECT_ID/re-vibe:$COMMIT_SHA .

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/re-vibe:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 're-vibe'
      - '--image'
      - 'gcr.io/$PROJECT_ID/re-vibe:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'

images:
  - 'gcr.io/$PROJECT_ID/re-vibe:$COMMIT_SHA'
