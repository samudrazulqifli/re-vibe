substitutions:
  _NEXT_PUBLIC_FIREBASE_API_KEY: 'AIzaSyDccYoEz5GU4t1LGQd_ViCYKgIL_d09Z1o'
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 're-vibe-496006-4f8a2.firebaseapp.com'
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: 're-vibe-496006-4f8a2'
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 're-vibe-496006-4f8a2.firebasestorage.app'
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '27064217723'
  _NEXT_PUBLIC_FIREBASE_APP_ID: '1:27064217723:web:44c51e3fdaf9afa299b2de'

steps:
  # Build the container image with Firebase client config baked in
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/re-vibe:$COMMIT_SHA'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/re-vibe:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 're-vibe'
      - '--image'
      - 'gcr.io/$PROJECT_ID/re-vibe:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'

images:
  - 'gcr.io/$PROJECT_ID/re-vibe:$COMMIT_SHA'
