<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Re-Vibe</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #F8F9FA;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #1A73E8; }
        p { color: #666; line-height: 1.5; }
        .btn {
            background-color: #1A73E8;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Oops! Kamu sedang offline</h1>
    <p>Sepertinya koneksi internet kamu terputus. Re-Vibe membutuhkan internet untuk menganalisis barangmu dengan AI.</p>
    <button class="btn" onclick="window.location.reload()">Coba Lagi</button>
</body>
</html>
